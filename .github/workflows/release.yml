name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      previous_tag: ${{ steps.prev_tag.outputs.latest_tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version format
        shell: bash
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${{ inputs.version }}"
            echo "Expected semver format, e.g. 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi

      - name: Set version in Cargo.toml / Cargo.lock / flake.nix
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          sed -i '/^name = "nyx"$/,/^version = / s/^version = ".*/version = "'"$VERSION"'"/' Cargo.lock
          sed -i '/pname = "nyx";/,/version = / s/version = "[^"]*";/version = "'"$VERSION"'";/' flake.nix

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(release): bump version to ${{ inputs.version }}"

      - name: Compute release tag
        id: meta
        shell: bash
        run: echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Find previous release tag
        id: prev_tag
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | grep -vx "v${{ inputs.version }}" | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v${{ inputs.version }}"
          fi
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Push release tag
        shell: bash
        run: |
          git tag -f "v${{ inputs.version }}" HEAD
          git push origin "v${{ inputs.version }}" --force

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          fromTag: ${{ steps.prev_tag.outputs.latest_tag }}
          toTag: v${{ inputs.version }}
          configuration: ".github/changelog_configuration.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: Nyx ${{ inputs.version }}
          body: Draft release. Assets are uploaded by the build matrix.
          draft: true
          prerelease: ${{ inputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build (Windows)
    needs: [prepare]
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Portable zip
        shell: pwsh
        run: |
          $name = "nyx-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "target/release/nyx.exe" -DestinationPath $name -Force

      - name: Build installer (NSIS)
        shell: pwsh
        run: |
          $exe = (Resolve-Path "target/release/nyx.exe").Path
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPPVERSION=${{ inputs.version }}" "/DSOURCEEXE=$exe" `
            installer/windows/nyx.nsi
          Copy-Item "installer/windows/Nyx_${{ inputs.version }}_x64-setup.exe" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          files: |
            nyx-x86_64-pc-windows-msvc.zip
            Nyx_${{ inputs.version }}_x64-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build (Linux)
    needs: [prepare]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      # gpui (X11/Wayland/Vulkan/font-kit) + tray-icon (GTK/appindicator/xdo).
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libfreetype6-dev \
            libvulkan-dev mesa-vulkan-drivers

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      # No --target: the binary lands in target/release/nyx, which the
      # cargo-deb / cargo-generate-rpm asset paths and the PKGBUILD expect.
      - name: Build release binary
        run: cargo build --release

      - name: Install packaging tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Portable tarball
        run: tar -C target/release -czf nyx-x86_64-unknown-linux-gnu.tar.gz nyx

      - name: Build .deb
        run: cargo deb --no-build --output nyx_${{ inputs.version }}_amd64.deb

      - name: Build .rpm
        run: |
          cargo generate-rpm
          cp target/generate-rpm/*.rpm "nyx-${{ inputs.version }}.x86_64.rpm"

      - name: Build .pkg.tar.xz (Arch)
        run: |
          cp target/release/nyx        installer/arch/nyx
          cp installer/linux/nyx.desktop installer/arch/nyx.desktop
          cp assets/brand/logo.png       installer/arch/nyx.png
          docker run --rm -v "$PWD/installer/arch:/pkg" -e VER="${{ inputs.version }}" \
            archlinux:latest bash -c '
              pacman -Sy --noconfirm base-devel >/dev/null
              useradd -m builder
              cp -r /pkg /home/builder/pkg && chown -R builder /home/builder/pkg
              cd /home/builder/pkg
              sed -i "s/^pkgver=.*/pkgver=${VER//-/_}/" PKGBUILD
              sudo -u builder env PKGEXT=.pkg.tar.xz makepkg -f --nodeps
              cp *.pkg.tar.xz /pkg/
            '
          cp installer/arch/*.pkg.tar.xz .

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          files: |
            nyx-x86_64-unknown-linux-gnu.tar.gz
            nyx_${{ inputs.version }}_amd64.deb
            nyx-${{ inputs.version }}.x86_64.rpm
            nyx-*-x86_64.pkg.tar.xz
          token: ${{ secrets.GITHUB_TOKEN }}

  cachix:
    name: Push to Cachix
    needs: [prepare]
    runs-on: ubuntu-latest
    if: ${{ ! inputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: nyx
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build (and push) the flake package
        run: nix build --print-build-logs .#nyx

  publish:
    name: Publish release
    needs: [prepare, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Finalize release with changelog
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Nyx ${{ needs.prepare.outputs.tag }}
          body: ${{ needs.prepare.outputs.changelog }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
