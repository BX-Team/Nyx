  profileTitle: Add a profile
  profileBody: Import a subscription URL or a local config file — this is your proxy source.
  profileHint: Use the “Add” button at the top right.
  serviceTitle: Install the service
  serviceBody: The background service lets Nyx manage the core and TUN mode without admin prompts.
  serviceHint: Open Mihomo settings and install the service.
  tunTitle: Choose how to route traffic
  tunBody: "Two ways to route traffic. System proxy needs no privileges but only covers apps that honor the desktop/proxy settings. TUN/VPN mode covers the whole device but needs network privileges for the core."
  tunHint: "On GNOME or Windows the system proxy is usually enough; on other Linux desktops use TUN for full coverage."
